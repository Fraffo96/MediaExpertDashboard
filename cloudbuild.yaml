# =============================================================================
# Cloud Build: build e deploy della NOSTRA dashboard (app FastAPI + BigQuery)
# Trigger su push su main. Progetto: mediaexpertdashboard
# =============================================================================

steps:
  # 1. Build immagine Docker della nostra app
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/${_PROJECT_ID}/dashboard:${SHORT_SHA}'
      - '.'
    id: 'build'

  # 2. Push su Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/${_PROJECT_ID}/dashboard:${SHORT_SHA}'
    id: 'push'
    waitFor: ['build']

  # 3. Deploy su Cloud Run (nostra app dashboard)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'dashboard'
      - '--image=gcr.io/${_PROJECT_ID}/dashboard:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--project=${_PROJECT_ID}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=GCP_PROJECT_ID=${_PROJECT_ID}'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--port=8080'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--timeout=300'
    id: 'deploy'
    waitFor: ['push']

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _PROJECT_ID: mediaexpertdashboard
  _REGION: europe-west1
