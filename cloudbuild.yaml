# =============================================================================
# Cloud Build: build e deploy della dashboard (FastAPI + BigQuery)
# Trigger su push su main. Progetto: mediaexpertdashboard
#
# Substitution opzionali (Console → Trigger → Variable substitutions):
#   _VPC_CONNECTOR     es. run-vpc-connector (nome Serverless VPC Access). Vuoto = niente Redis privato.
#   _EXTRA_ENV_VARS    es. REDIS_URL=redis://10.0.0.3:6379,CACHE_TTL_LONG_SECONDS=604800
#   _SET_SECRETS       es. JWT_SECRET_KEY=jwt-secret-key:latest,PREWARM_TOKEN=prewarm-token:latest
#                      Richiede Secret Manager + IAM per il runtime SA (secretAccessor).
#   _BRAND_LOGOS_PUBLIC_BASE  es. https://storage.googleapis.com/PROJECT-brand-logos/brands (loghi PNG su GCS)
#   _FIRESTORE_DATABASE       vuoto = database default; altrimenti nome DB Firestore se multi-database
# =============================================================================

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/dashboard/dashboard:${SHORT_SHA}'
      - '.'
    id: 'build'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/dashboard/dashboard:${SHORT_SHA}'
    id: 'push'
    waitFor: ['build']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-ec'
      - |
        ENV_VARS="GCP_PROJECT_ID=${_PROJECT_ID}"
        if [ -n "${_EXTRA_ENV_VARS}" ]; then
          ENV_VARS="$${ENV_VARS},${_EXTRA_ENV_VARS}"
        fi
        if [ -n "${_BRAND_LOGOS_PUBLIC_BASE}" ]; then
          ENV_VARS="$${ENV_VARS},BRAND_LOGOS_PUBLIC_BASE=${_BRAND_LOGOS_PUBLIC_BASE}"
        fi
        if [ -n "${_FIRESTORE_DATABASE}" ]; then
          ENV_VARS="$${ENV_VARS},FIRESTORE_DATABASE=${_FIRESTORE_DATABASE}"
        fi
        DEPLOY=(gcloud run deploy dashboard
          --image="${_REGION}-docker.pkg.dev/${_PROJECT_ID}/dashboard/dashboard:${SHORT_SHA}"
          --region="${_REGION}"
          --project="${_PROJECT_ID}"
          --platform=managed
          --allow-unauthenticated
          --set-env-vars="$${ENV_VARS}"
          --memory=2Gi
          --cpu=2
          --port=8080
          --min-instances=1
          --max-instances=5
          --timeout=120
        )
        if [ -n "${_VPC_CONNECTOR}" ]; then
          DEPLOY+=(--vpc-connector="${_VPC_CONNECTOR}" --vpc-egress=private-ranges-only)
        fi
        if [ -n "${_SET_SECRETS}" ]; then
          DEPLOY+=(--set-secrets="${_SET_SECRETS}")
        fi
        "$${DEPLOY[@]}"
    id: 'deploy'
    waitFor: ['push']

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _PROJECT_ID: mediaexpertdashboard
  _REGION: europe-west1
  _VPC_CONNECTOR: ''
  _EXTRA_ENV_VARS: ''
  _SET_SECRETS: ''
  _BRAND_LOGOS_PUBLIC_BASE: ''
  _FIRESTORE_DATABASE: ''
