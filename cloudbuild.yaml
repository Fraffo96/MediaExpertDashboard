# =============================================================================
# Cloud Build: build e deploy Metabase su Cloud Run
# Trigger su push su main (o branch scelto)
# Progetto: mediaexpertdashboard
# =============================================================================

steps:
  # Deploy diretto da immagine ufficiale (no build)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'metabase'
      - '--image=metabase/metabase:latest'
      - '--verbosity=info'
      - '--region=${_REGION}'
      - '--project=${_PROJECT_ID}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=MB_DB_FILE=/tmp/metabase.db,MB_JETTY_HOST=0.0.0.0'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--port=3000'
      - '--no-cpu-throttling'
      - '--timeout=600'
    id: 'deploy-metabase'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _PROJECT_ID: mediaexpertdashboard
  _REGION: europe-west1
