# Postgres 15 per sviluppo locale - Retailer PL dashboard
services:
  postgres:
    image: postgres:15-alpine
    container_name: retailer_pl_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: retailer_pl
    ports:
      - "5432:5432"
    volumes:
      - pgdata_retailer:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d retailer_pl"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_retailer:
