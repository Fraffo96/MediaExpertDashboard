<div class="kpi-row" data-widget-id="kpi" data-widget-label="KPI Cards">
  <div class="kpi-card">
    <div class="kpi-label">Total Sales (PLN)</div>
    <div class="kpi-value yellow" id="kpi-total">--</div>
    <div class="kpi-sub" id="kpi-units">--</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">YoY Growth</div>
    <div class="kpi-value blue" id="kpi-yoy">--</div>
    <div class="kpi-sub" id="kpi-yoy-sub">vs prior year</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">Promo Share <span class="help-icon" title="% of total sales (PLN) from promoted products">ⓘ</span></div>
    <div class="kpi-value green" id="kpi-promo">--</div>
    <div class="kpi-sub" id="kpi-promo-sub">--</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">Avg Discount Depth</div>
    <div class="kpi-value amber" id="kpi-disc">--</div>
    <div class="kpi-sub">when on promo</div>
  </div>
</div>
