<div class="dashboard-section" data-widget-id="section-products" data-widget-label="Product Performance">
  <div class="section-header">
    <span class="section-badge prod">P</span>
    <h2>Product Performance</h2>
  </div>
  <div class="charts-grid">
    <div class="chart-card" data-widget-id="chartTopProducts" data-widget-label="Top Products">
      <div class="chart-header">
        <h3>Top 20 Products by Sales</h3>
      </div>
      <div class="products-table-container">
        <table class="products-table" id="tableTopProducts" aria-label="Top products by sales">
          <thead>
            <tr>
              <th>Product</th>
              <th>Brand</th>
              <th>Category</th>
              <th class="num">Sales (PLN)</th>
              <th class="num">Units</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
