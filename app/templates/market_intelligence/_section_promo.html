<div class="chart-card full mi-layout-3col" data-widget-id="mi-promo-share" data-widget-label="Promo Share of Sales">
  <div class="mi-col-left">
    <h3 class="mi-chart-title">3. Promo Share of Sales</h3>
    <div class="mi-promo-share-controls">
      <label>Period: <div id="mi-period-gran-promo-share" class="mi-dropdown-container"></div></label>
      <label class="mi-period-bound-row mi-period-row-month-promo-share" style="display:none;">
        <span class="mi-period-week-inline-label">Month</span>
        <span class="mi-period-month-inputs">
          <input type="number" id="mi-period-month-y-promo-share" class="mi-period-bound-input mi-period-month-year" min="2020" max="2035" step="1" title="Year" aria-label="Calendar year" />
          <input type="number" id="mi-period-month-m-promo-share" class="mi-period-bound-input mi-period-month-num" min="1" max="12" step="1" title="Month" aria-label="Month (1–12)" />
        </span>
      </label>
      <label class="mi-period-bound-row mi-period-row-week-promo-share" style="display:none;">
        <span class="mi-period-week-inline-label">ISO week</span>
        <span class="mi-period-week-inputs">
          <input type="number" id="mi-period-iso-y-promo-share" class="mi-period-bound-input mi-period-iso-year" min="2020" max="2035" step="1" title="ISO year" aria-label="ISO year" />
          <input type="number" id="mi-period-iso-w-promo-share" class="mi-period-bound-input mi-period-iso-week" min="1" max="53" step="1" title="Week number" aria-label="ISO week number" />
        </span>
      </label>
      <label class="mi-period-row-year-promo-share">Year: <div id="mi-year-promo-share" class="mi-dropdown-container"></div></label>
      <label>Channel: <div id="mi-channel-promo-share" class="mi-dropdown-container"></div></label>
      <label>Category: <div id="mi-promo-share-category-select" class="mi-dropdown-container"></div></label>
    </div>
  </div>
  <div class="mi-col-center">
    <div class="chart-wrap chart-wrap-promo">
      <div class="chart-loading" data-chart-scope="promo_share"><div class="chart-spinner"></div></div>
      <canvas id="chart-promo-share"></canvas>
    </div>
  </div>
  <div class="mi-col-right" id="mi-promo-share-info">
    <div class="mi-info-panel" id="mi-promo-share-key-insight"></div>
  </div>
</div>
