<div class="chart-card full mi-layout-3col" data-widget-id="mi-segment-sku" data-widget-label="Segment by SKU">

    <p class="mi-chart-desc">Select a SKU to see which customer segments buy it.</p>

      <label>Year: <div id="mi-year-segment-sku" class="mi-dropdown-container"></div></label>
