<div class="chart-card full mi-pie-chart-card mi-layout-3col" data-widget-id="mi-category-pie" data-widget-label="Category Brand Mix">
  <div class="mi-col-left">
    <h3 class="mi-chart-title">1. Categories</h3>
    <div class="mi-pie-controls">
      <label>Period: <div id="mi-period-gran-category" class="mi-dropdown-container"></div></label>
      <label class="mi-period-bound-row mi-period-row-month-category" style="display:none;">
        <span class="mi-period-week-inline-label">Month</span>
        <span class="mi-period-month-inputs">
          <input type="number" id="mi-period-month-y-category" class="mi-period-bound-input mi-period-month-year" min="2020" max="2035" step="1" title="Year" aria-label="Calendar year" />
          <input type="number" id="mi-period-month-m-category" class="mi-period-bound-input mi-period-month-num" min="1" max="12" step="1" title="Month" aria-label="Month (1–12)" />
        </span>
      </label>
      <label class="mi-period-bound-row mi-period-row-week-category" style="display:none;">
        <span class="mi-period-week-inline-label">ISO week</span>
        <span class="mi-period-week-inputs">
          <input type="number" id="mi-period-iso-y-category" class="mi-period-bound-input mi-period-iso-year" min="2020" max="2035" step="1" title="ISO year" aria-label="ISO year" />
          <input type="number" id="mi-period-iso-w-category" class="mi-period-bound-input mi-period-iso-week" min="1" max="53" step="1" title="Week number" aria-label="ISO week number" />
        </span>
      </label>
      <label class="mi-period-row-year-category">Year: <div id="mi-year-category" class="mi-dropdown-container"></div></label>
      <label>Channel: <div id="mi-channel-category" class="mi-dropdown-container"></div></label>
      <label>Category: <div id="mi-category-pie-select" class="mi-dropdown-container"></div></label>
      <label>Metric: <div id="mi-metric-categories" class="mi-dropdown-container"></div></label>
    </div>
  </div>
  <div class="mi-col-center">
    <div class="chart-wrap mi-pie-chart-wrap">
      <div class="chart-loading" data-chart-scope="category_pie"><div class="chart-spinner"></div></div>
      <canvas id="chart-category-pie"></canvas>
    </div>
  </div>
  <div class="mi-col-right" id="mi-category-info">
    <div class="mi-info-panel"></div>
  </div>
</div>
<div class="chart-card full mi-pie-chart-card mi-layout-3col" data-widget-id="mi-subcategory-pie" data-widget-label="Subcategory Brand Mix">
  <div class="mi-col-left">
    <h3 class="mi-chart-title">2. Subcategories</h3>
    <div class="mi-pie-controls">
      <label>Period: <div id="mi-period-gran-subcategory" class="mi-dropdown-container"></div></label>
      <label class="mi-period-bound-row mi-period-row-month-subcategory" style="display:none;">
        <span class="mi-period-week-inline-label">Month</span>
        <span class="mi-period-month-inputs">
          <input type="number" id="mi-period-month-y-subcategory" class="mi-period-bound-input mi-period-month-year" min="2020" max="2035" step="1" title="Year" aria-label="Calendar year" />
          <input type="number" id="mi-period-month-m-subcategory" class="mi-period-bound-input mi-period-month-num" min="1" max="12" step="1" title="Month" aria-label="Month (1–12)" />
        </span>
      </label>
      <label class="mi-period-bound-row mi-period-row-week-subcategory" style="display:none;">
        <span class="mi-period-week-inline-label">ISO week</span>
        <span class="mi-period-week-inputs">
          <input type="number" id="mi-period-iso-y-subcategory" class="mi-period-bound-input mi-period-iso-year" min="2020" max="2035" step="1" title="ISO year" aria-label="ISO year" />
          <input type="number" id="mi-period-iso-w-subcategory" class="mi-period-bound-input mi-period-iso-week" min="1" max="53" step="1" title="Week number" aria-label="ISO week number" />
        </span>
      </label>
      <label class="mi-period-row-year-subcategory">Year: <div id="mi-year-subcategory" class="mi-dropdown-container"></div></label>
      <label>Channel: <div id="mi-channel-subcategory" class="mi-dropdown-container"></div></label>
      <label>Category: <div id="mi-subcategory-category-select" class="mi-dropdown-container"></div></label>
      <label>Subcategory: <div id="mi-subcategory-pie-select" class="mi-dropdown-container"></div></label>
      <label>Metric: <div id="mi-metric-subcategories" class="mi-dropdown-container"></div></label>
    </div>
  </div>
  <div class="mi-col-center">
    <div class="chart-wrap mi-pie-chart-wrap">
      <div class="chart-loading" data-chart-scope="subcategory_pie"><div class="chart-spinner"></div></div>
      <canvas id="chart-subcategory-pie"></canvas>
    </div>
  </div>
  <div class="mi-col-right" id="mi-subcategory-info">
    <div class="mi-info-panel"></div>
  </div>
</div>
