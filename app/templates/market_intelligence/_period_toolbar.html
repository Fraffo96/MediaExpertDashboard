<div class="mi-period-toolbar chart-card" id="mi-period-toolbar" style="margin-bottom:1rem;padding:1rem;">
  <div class="mi-period-toolbar-row" style="display:flex;flex-wrap:wrap;gap:1rem;align-items:center;">
    <label style="display:flex;gap:.5rem;align-items:center;">Period type
      <select id="mi-period-granularity" class="form-select" style="min-width:12rem;">
        <option value="all_years">All years (precalc)</option>
        <option value="year">Calendar year</option>
        <option value="month">Month</option>
        <option value="week">Week (ISO)</option>
      </select>
    </label>
    <span id="mi-period-panel-year" class="mi-period-panel" style="display:none;">
      <label style="display:flex;gap:.5rem;align-items:center;">Year
        <select id="mi-period-year-select"></select>
      </label>
    </span>
    <span id="mi-period-panel-month" class="mi-period-panel" style="display:none;">
      <label style="display:flex;gap:.5rem;align-items:center;">Month
        <input type="month" id="mi-period-month-input">
      </label>
    </span>
    <span id="mi-period-panel-week" class="mi-period-panel" style="display:none;">
      <label style="display:flex;gap:.5rem;align-items:center;">ISO year
        <input type="number" id="mi-period-iso-year" min="2020" max="2035" step="1" style="width:5rem;">
      </label>
      <label style="display:flex;gap:.5rem;align-items:center;">Week
        <input type="number" id="mi-period-iso-week" min="1" max="53" step="1" style="width:4rem;">
      </label>
    </span>
    <button type="button" class="btn btn-primary" id="mi-period-apply">Apply period</button>
  </div>
  <p class="text-muted" style="margin:.5rem 0 0;font-size:.85rem;" id="mi-period-hint">For month or week, data loads from BigQuery (live query) — first load may take a few seconds.</p>
</div>
